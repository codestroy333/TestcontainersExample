spring:
  application:
    name: TestcontainersExampleApp
  jpa:
    hibernate:
      ddl-auto: update
    generate-ddl: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: jdbc:postgresql://localhost:5433/cardb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
